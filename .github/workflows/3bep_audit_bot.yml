name: 3BEP Autonomous Audit Bot

on:
  schedule:
    # Runs on Mondays and Thursdays at 08:00 UTC
    - cron: '0 8 * * 1,4'
  workflow_dispatch: # Allows manual trigger from GitHub Actions pane

permissions:
  issues: write     # Essential permission for the Bot to open issues
  contents: write   # Permission to bypass and commit history.json back to repo

jobs:
  audit-arxiv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Execute ArXiv Scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/audit_bot/arxiv_scanner.py
          
      - name: Persist Bot Memory (history.json)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/audit_bot/history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(bot): update arXiv processed history [skip ci]" && git push)
